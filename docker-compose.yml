services:
  taxi_postgres:
    container_name: taxi_postgres
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: taxi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - taxi_postgres_data:/var/lib/postgresql/data
    networks:
      - proxy

  taxi_server:
    container_name: taxi_server
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      DATABASE_URL: postgresql://postgres:postgres@taxi_postgres:5432/taxi
    networks:
      - proxy

  taxi_dispatcher:
    container_name: taxi_dispatcher
    build:
      context: .
      dockerfile: Dockerfile.spa
      args:
        APP: dispatcher
    networks:
      - proxy

  taxi_driver:
    container_name: taxi_driver
    build:
      context: .
      dockerfile: Dockerfile.spa
      args:
        APP: driver
    networks:
      - proxy

  taxi_passenger:
    container_name: taxi_passenger
    build:
      context: .
      dockerfile: Dockerfile.spa
      args:
        APP: passenger
    networks:
      - proxy

networks:
  proxy:
    external: true

volumes:
  taxi_postgres_data:
